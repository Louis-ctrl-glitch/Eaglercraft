<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RED BUNKER OS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000000;
    color:#ff2a2a;
    font-family:'Share Tech Mono',monospace;
    overflow:hidden;
}

/* MATRIX CANVAS */
#matrix{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* Flash Effects */
body.flash::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        0deg,
        rgba(255,0,0,0.08) 0px,
        rgba(255,0,0,0.08) 2px,
        transparent 2px,
        transparent 4px
    );
    pointer-events:none;
}

@keyframes flicker{
    0%{opacity:.95}
    50%{opacity:1}
    100%{opacity:.97}
}

body.flash{
    animation:flicker .15s infinite;
}

/* Boot */
#boot{
    position:absolute;
    width:100%;
    height:100%;
    padding:20px;
    white-space:pre-line;
    z-index:2;
}

/* Desktop */
#desktop{
    display:none;
    width:100%;
    height:100%;
    position:absolute;
    z-index:2;
}

/* Window */
.window{
    position:absolute;
    width:80%;
    height:80%;
    top:10%;
    left:10%;
    background:#100000;
    border:2px solid red;
    box-shadow:0 0 20px red;
}

.titlebar{
    background:#300000;
    padding:6px;
    cursor:move;
    border-bottom:1px solid red;
}

iframe{
    width:100%;
    height:calc(100% - 35px);
    border:none;
}

/* Controls */
#controls{
    position:fixed;
    top:10px;
    left:10px;
    z-index:3;
}

button{
    background:black;
    color:yellow;
    border:1px solid yellow;
    padding:6px 10px;
    cursor:pointer;
    font-family:inherit;
}

button:hover{
    background:yellow;
    color:black;
}
</style>
</head>

<body class="flash">

<canvas id="matrix"></canvas>

<div id="controls">
    <button onclick="toggleFlash()">Disable Flash Effects</button>
</div>

<div id="boot"></div>

<div id="desktop">
    <div class="window" id="mainWindow">
        <div class="titlebar">☭ MILITARY CLIENT NODE ☭</div>
        <iframe id="clientFrame"></iframe>
    </div>
</div>

<script>

/* =======================================================
   🔴 PASTE YOUR LINK BELOW
   ======================================================= */

const CLIENT_LINK = "https://eaglercraft1-8.github.io/";

/* ======================================================= */


/* Accessibility */
if(localStorage.getItem("flashDisabled") === "true"){
    document.body.classList.remove("flash");
}

function toggleFlash(){
    document.body.classList.toggle("flash");
    const disabled = !document.body.classList.contains("flash");
    localStorage.setItem("flashDisabled", disabled);
}

/* MATRIX HAMMER & SICKLE RAIN */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const symbols = ["☭","☭","☭","☭","☭"];
const fontSize = 22;
let columns = Math.floor(window.innerWidth / fontSize);
let drops = new Array(columns).fill(1);

function resetColumns(){
    columns = Math.floor(window.innerWidth / fontSize);
    drops = new Array(columns).fill(1);
}
window.addEventListener("resize", resetColumns);

function drawMatrix(){

    if(localStorage.getItem("flashDisabled") === "true") {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        return;
    }

    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#FFD700";
    ctx.font = fontSize + "px monospace";
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 8;

    for(let i = 0; i < drops.length; i++){
        const text = symbols[Math.floor(Math.random()*symbols.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(drawMatrix, 50);


/* Boot Text */

const bootText = `
RED BUNKER OS v10.0
STATE PROPERTY
-----------------------
INITIALIZING GRAPHICS...
CHECKING SECURITY LEVEL...
CONNECTING TO CENTRAL NODE...
ACCESS GRANTED.
WELCOME, COMRADE.
`;

let i=0;
function typeBoot(){
    if(i<bootText.length){
        document.getElementById("boot").innerHTML+=bootText.charAt(i);
        i++;
        setTimeout(typeBoot,20);
    }else{
        setTimeout(()=>{
            document.getElementById("boot").style.display="none";
            document.getElementById("desktop").style.display="block";
            document.getElementById("clientFrame").src = CLIENT_LINK;
        },1000);
    }
}
typeBoot();


/* Drag Window */

dragElement(document.getElementById("mainWindow"));

function dragElement(el){
    let pos1=0,pos2=0,pos3=0,pos4=0;
    el.querySelector(".titlebar").onmousedown=dragMouseDown;

    function dragMouseDown(e){
        e.preventDefault();
        pos3=e.clientX;
        pos4=e.clientY;
        document.onmouseup=closeDrag;
        document.onmousemove=elementDrag;
    }

    function elementDrag(e){
        e.preventDefault();
        pos1=pos3-e.clientX;
        pos2=pos4-e.clientY;
        pos3=e.clientX;
        pos4=e.clientY;
        el.style.top=(el.offsetTop-pos2)+"px";
        el.style.left=(el.offsetLeft-pos1)+"px";
    }

    function closeDrag(){
        document.onmouseup=null;
        document.onmousemove=null;
    }
}
</script>

</body>
</html>
