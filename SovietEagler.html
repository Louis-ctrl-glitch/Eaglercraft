<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RedCraft Supreme</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: 'Russo One', sans-serif;
}

/* Waving red animated background */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 30%, #aa0000, #400000);
    animation: wave 10s infinite linear;
    z-index: -2;
}

@keyframes wave {
    0% { transform: translate(-10%, -10%) rotate(0deg); }
    50% { transform: translate(-5%, -5%) rotate(1deg); }
    100% { transform: translate(-10%, -10%) rotate(0deg); }
}

/* CRT Effect */
.crt {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.2) 0px,
        rgba(0,0,0,0.2) 2px,
        transparent 2px,
        transparent 4px
    );
    animation: flicker 0.15s infinite;
    z-index: 10;
}

@keyframes flicker {
    0% { opacity: 0.95; }
    50% { opacity: 1; }
    100% { opacity: 0.9; }
}

/* Splash Screen */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #300000;
    color: gold;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 5;
    text-align: center;
}

#splash h1 {
    font-size: 50px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 30px gold; }
}

.loading-bar {
    width: 300px;
    height: 20px;
    border: 2px solid gold;
    margin-top: 20px;
}

.progress {
    width: 0%;
    height: 100%;
    background: gold;
    animation: load 5s forwards;
}

@keyframes load {
    from { width: 0%; }
    to { width: 100%; }
}

/* Launcher */
#launcher {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    color: gold;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 40px;
    border-bottom: 3px solid gold;
}

button {
    background: #900000;
    border: 2px solid gold;
    color: gold;
    padding: 10px 20px;
    cursor: pointer;
    margin: 20px;
    font-family: 'Share Tech Mono', monospace;
}

button:hover {
    background: #cc0000;
}

iframe {
    width: 100%;
    height: calc(100% - 120px);
    border: none;
}
</style>
</head>

<body>

<div id="splash">
    <div>★ ☭ ★</div>
    <h1>REDCRAFT SUPREME</h1>
    <div>Initializing Workers' Client...</div>
    <div class="loading-bar"><div class="progress"></div></div>
</div>

<div id="launcher">
    <header>EAGLERCRAFT: MOTHERLAND EDITION</header>
    <center>
        <button onclick="launchGame()">ENTER THE MOTHERLAND</button>
    </center>
    <iframe id="gameFrame"></iframe>
</div>

<div class="crt"></div>

<!-- Add your own anthem file -->
<audio id="anthem" src="anthem.mp3"></audio>

<script>
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("launcher").style.display = "block";
    document.getElementById("anthem").play().catch(()=>{});
}, 5000);

function launchGame() {
    document.getElementById("gameFrame").src = "https://eaglercraft1-8.github.io/";
}
</script>

</body>
</html>
