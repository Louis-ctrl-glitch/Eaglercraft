<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RED BUNKER OS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    color:#ff2a2a;
    font-family:'Share Tech Mono',monospace;
    overflow:hidden;
}

/* MATRIX */
#matrix{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* FLASH */
body.flash::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        0deg,
        rgba(255,0,0,0.08) 0px,
        rgba(255,0,0,0.08) 2px,
        transparent 2px,
        transparent 4px
    );
    pointer-events:none;
}

@keyframes flicker{
    0%{opacity:.95}
    50%{opacity:1}
    100%{opacity:.97}
}
body.flash{ animation:flicker .15s infinite; }

/* UI Layers */
#boot,#desktop,#controls{
    position:absolute;
    z-index:2;
}

#boot{ width:100%; height:100%; padding:20px; white-space:pre-line; }
#desktop{ display:none; width:100%; height:100%; }

/* Window */
.window{
    position:absolute;
    width:80%;
    height:80%;
    top:10%;
    left:10%;
    background:#100000;
    border:2px solid red;
    box-shadow:0 0 20px red;
}
.titlebar{
    background:#300000;
    padding:6px;
    cursor:move;
    border-bottom:1px solid red;
}
iframe{
    width:100%;
    height:calc(100% - 35px);
    border:none;
}

/* Control Panel */
#controls{
    top:10px;
    left:10px;
    z-index:3;
}
.panel{
    background:#111;
    border:1px solid yellow;
    padding:10px;
    margin-top:5px;
    width:260px;
}
button,select,input{
    background:black;
    color:yellow;
    border:1px solid yellow;
    font-family:inherit;
    margin-top:4px;
}
label{ display:block; margin-top:6px; font-size:13px; }
</style>
</head>

<body class="flash">

<canvas id="matrix"></canvas>

<div id="controls">
    <button onclick="togglePanel()">Settings</button>
    <div id="settingsPanel" class="panel" style="display:none;">

        <label>Matrix Speed
            <input type="range" min="20" max="150" value="50" id="speedSlider">
        </label>

        <label>Symbol Size
            <input type="range" min="12" max="40" value="22" id="sizeSlider">
        </label>

        <label>Glow Intensity
            <input type="range" min="0" max="20" value="8" id="glowSlider">
        </label>

        <label>Rain Density
            <input type="range" min="0.5" max="2" step="0.1" value="1" id="densitySlider">
        </label>

        <label>Matrix Color
            <select id="colorSelect">
                <option value="#FFD700">Yellow</option>
                <option value="#FF0000">Red</option>
                <option value="#00FF00">Green</option>
                <option value="#FFFFFF">White</option>
            </select>
        </label>

        <button onclick="toggleMatrix()">Toggle Matrix</button>
        <button onclick="toggleFlash()">Toggle Flash</button>
        <button onclick="resetSettings()">Reset Defaults</button>

    </div>
</div>

<div id="boot"></div>

<div id="desktop">
    <div class="window" id="mainWindow">
        <div class="titlebar">☭ MILITARY CLIENT NODE ☭</div>
        <iframe id="clientFrame"></iframe>
    </div>
</div>

<script>

/* ================= EDIT THIS ================= */
const CLIENT_LINK = "https://eaglercraft1-8.github.io/";
/* ============================================= */

/* SETTINGS */
let settings = JSON.parse(localStorage.getItem("bunkerSettings")) || {
    speed:50,
    size:22,
    glow:8,
    density:1,
    color:"#FFD700",
    matrix:true,
    flash:true
};

function saveSettings(){
    localStorage.setItem("bunkerSettings", JSON.stringify(settings));
}

/* Apply settings to UI */
document.getElementById("speedSlider").value=settings.speed;
document.getElementById("sizeSlider").value=settings.size;
document.getElementById("glowSlider").value=settings.glow;
document.getElementById("densitySlider").value=settings.density;
document.getElementById("colorSelect").value=settings.color;

if(!settings.flash) document.body.classList.remove("flash");

/* Controls */
function togglePanel(){
    const p=document.getElementById("settingsPanel");
    p.style.display = p.style.display==="none" ? "block" : "none";
}
function toggleFlash(){
    settings.flash=!settings.flash;
    document.body.classList.toggle("flash");
    saveSettings();
}
function toggleMatrix(){
    settings.matrix=!settings.matrix;
    saveSettings();
}
function resetSettings(){
    localStorage.removeItem("bunkerSettings");
    location.reload();
}

/* Sliders */
speedSlider.oninput=e=>{settings.speed=e.target.value; saveSettings();}
sizeSlider.oninput=e=>{settings.size=e.target.value; saveSettings(); resetColumns();}
glowSlider.oninput=e=>{settings.glow=e.target.value; saveSettings();}
densitySlider.oninput=e=>{settings.density=e.target.value; saveSettings(); resetColumns();}
colorSelect.onchange=e=>{settings.color=e.target.value; saveSettings();}

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let columns,drops;

function resetColumns(){
    columns=Math.floor((window.innerWidth/settings.size)*settings.density);
    drops=new Array(columns).fill(1);
}
resetColumns();

function drawMatrix(){
    if(!settings.matrix){ ctx.clearRect(0,0,canvas.width,canvas.height); return; }

    ctx.fillStyle="rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle=settings.color;
    ctx.font=settings.size+"px monospace";
    ctx.shadowColor=settings.color;
    ctx.shadowBlur=settings.glow;

    for(let i=0;i<drops.length;i++){
        ctx.fillText("☭", i*settings.size, drops[i]*settings.size);
        if(drops[i]*settings.size>canvas.height && Math.random()>0.975)
            drops[i]=0;
        drops[i]++;
    }
}
setInterval(drawMatrix, settings.speed);

/* Boot */
const bootText=`
RED BUNKER OS v11.0
STATE PROPERTY
INITIALIZING...
ACCESS GRANTED.
`;
let i=0;
function typeBoot(){
    if(i<bootText.length){
        document.getElementById("boot").innerHTML+=bootText.charAt(i);
        i++;
        setTimeout(typeBoot,20);
    }else{
        setTimeout(()=>{
            boot.style.display="none";
            desktop.style.display="block";
            clientFrame.src=CLIENT_LINK;
        },800);
    }
}
typeBoot();

/* Drag */
dragElement(document.getElementById("mainWindow"));
function dragElement(el){
    let pos1=0,pos2=0,pos3=0,pos4=0;
    el.querySelector(".titlebar").onmousedown=e=>{
        pos3=e.clientX; pos4=e.clientY;
        document.onmousemove=e=>{
            pos1=pos3-e.clientX;
            pos2=pos4-e.clientY;
            pos3=e.clientX; pos4=e.clientY;
            el.style.top=(el.offsetTop-pos2)+"px";
            el.style.left=(el.offsetLeft-pos1)+"px";
        };
        document.onmouseup=()=>{document.onmousemove=null;}
    };
}
</script>

</body>
</html>
