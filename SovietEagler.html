<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iron Client</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap');

body{
    margin:0;
    font-family:'Russo One', sans-serif;
    background:linear-gradient(rgba(120,0,0,0.85),rgba(40,0,0,0.95)),
    url("https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_the_Soviet_Union.svg/1920px-Flag_of_the_Soviet_Union.svg.png");
    background-size:cover;
    color:white;
}

header{
    text-align:center;
    padding:20px;
    font-size:40px;
    letter-spacing:3px;
    text-shadow:0 0 15px red;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.gamebox{
    width:90%;
    max-width:1100px;
    height:650px;
    border:4px solid red;
    box-shadow:0 0 30px red;
    background:black;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

.footer{
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:14px;
    opacity:0.7;
}

.tanks{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    pointer-events:none;
}

.tanks img{
    width:220px;
    opacity:0.85;
}
</style>
</head>

<body>

<header>
☭ IRON CLIENT ☭
</header>

<div class="container">
<div class="gamebox">
<iframe src="https://eaglercraft1-8.github.io/"></iframe>
</div>
</div>

<div class="tanks">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5b/T-34_tank.png">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5b/T-34_tank.png">
</div>

<div class="footer">
Strength • Steel • Victory
</div>

</body>
</html>
