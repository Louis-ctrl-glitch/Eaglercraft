<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOVIET TERMINAL OS</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:#00ff00;
font-family:'Share Tech Mono',monospace;
overflow:hidden;
}

/* MATRIX */

#matrix{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* FLAG */

#flag{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40vw;
opacity:.76;
color:red;
pointer-events:none;
z-index:-2;
}

/* RADAR */

#radar{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:
radial-gradient(circle at center, rgba(0,255,0,.2) 0%, transparent 60%);
animation: radarSweep 6s linear infinite;
z-index:-1;
}

@keyframes radarSweep{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* BOOT */

#boot{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
white-space:pre-line;
}

/* SETTINGS */

#settings{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#020202;
border-right:2px solid #00ff00;
padding:10px;
z-index:10;
display:none;
}

button{
width:100%;
margin:4px 0;
background:black;
color:#00ff00;
border:1px solid #00ff00;
cursor:pointer;
}

/* TOPBAR */

#topbar{
position:fixed;
left:200px;
right:0;
top:0;
height:45px;
background:#050505;
border-bottom:2px solid #00ff00;
display:flex;
align-items:center;
padding-left:10px;
z-index:9;
}

#fps{
margin-left:auto;
margin-right:15px;
}

/* WINDOW */

#window{
position:absolute;
top:60px;
left:210px;
right:10px;
bottom:10px;
border:3px solid #00ff00;
background:black;
resize:both;
overflow:hidden;
}

#titlebar{
background:#031203;
padding:5px;
cursor:move;
border-bottom:1px solid #00ff00;
}

iframe{
width:100%;
height:calc(100% - 30px);
border:none;
}

/* TANKS */

.tank{
position:fixed;
top:50%;
transform:translateY(-50%);
width:200px;
opacity:.85;
pointer-events:none;
}

#tankLeft{left:0;}
#tankRight{
right:0;
transform:translateY(-50%) scaleX(-1);
}

</style>
</head>

<body>

<div id="flag">☭</div>
<div id="radar"></div>

<img id="tankLeft" class="tank" src="https://pngimg.com/uploads/tank/tank_PNG132.png">
<img id="tankRight" class="tank" src="https://pngimg.com/uploads/tank/tank_PNG132.png">

<canvas id="matrix"></canvas>

<div id="boot"></div>

<div id="settings">

<h3>SETTINGS</h3>

<button onclick="toggleMatrix()">Matrix</button>
<button onclick="toggleFlag()">Flag</button>
<button onclick="toggleRadar()">Radar</button>
<button onclick="toggleTanks()">Tanks</button>
<button onclick="toggleFPS()">FPS</button>
<button onclick="performanceMode()">Performance</button>
<button onclick="fullscreen()">Fullscreen</button>

</div>

<div id="topbar">
☭ SOVIET TERMINAL OS
<div id="fps">FPS: 0</div>
</div>

<div id="window">

<div id="titlebar">APPLICATION TERMINAL</div>

<iframe id="app"></iframe>

</div>

<script>

/* PUT YOUR APP URL HERE */

const APP_URL="https://eaglercraft1-8.github.io/";

/* BOOT */

const bootText=`SOVIET TERMINAL OS
MILITARY NODE CONNECTED
ACCESS LEVEL: COMRADE
LOADING SYSTEM MODULES
INITIALIZING NETWORK`;

let i=0;

function boot(){

if(i<bootText.length){
document.getElementById("boot").innerHTML+=bootText[i++];
setTimeout(boot,20);
}else{

setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("settings").style.display="block";
document.getElementById("app").src=APP_URL;
},800);

}

}

boot();

/* MATRIX */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let fontSize=18;
let columns=canvas.width/fontSize;

let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

const words=["☭","SOVIET","UNION"];

let matrix=true;

function draw(){

if(!matrix)return;

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#FFD700";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=words[Math.floor(Math.random()*words.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,50);

/* FPS */

let frames=0;
let last=performance.now();

function fpsLoop(){

frames++;

let now=performance.now();

if(now-last>=1000){

document.getElementById("fps").innerText="FPS: "+frames;

frames=0;
last=now;

}

requestAnimationFrame(fpsLoop);

}

fpsLoop();

/* SETTINGS */

function toggleMatrix(){matrix=!matrix;}

function toggleFlag(){

let f=document.getElementById("flag");

f.style.display=f.style.display==="none"?"block":"none";

}

function toggleRadar(){

let r=document.getElementById("radar");

r.style.display=r.style.display==="none"?"block":"none";

}

function toggleTanks(){

let l=document.getElementById("tankLeft");
let r=document.getElementById("tankRight");

let state=l.style.display==="none";

l.style.display=state?"block":"none";
r.style.display=state?"block":"none";

}

function toggleFPS(){

let f=document.getElementById("fps");

f.style.display=f.style.display==="none"?"block":"none";

}

function performanceMode(){

fontSize=26;

}

/* FULLSCREEN */

function fullscreen(){

document.getElementById("app").requestFullscreen();

}

/* DRAG WINDOW */

let win=document.getElementById("window");
let bar=document.getElementById("titlebar");

bar.onmousedown=function(e){

let x=e.clientX-win.offsetLeft;
let y=e.clientY-win.offsetTop;

document.onmousemove=function(e){

win.style.left=e.clientX-x+"px";
win.style.top=e.clientY-y+"px";

};

document.onmouseup=function(){

document.onmousemove=null;

};

};

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>
</html>
