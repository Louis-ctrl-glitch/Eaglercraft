<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RED BUNKER CLIENT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:#ff2a2a;
font-family:'Share Tech Mono',monospace;
overflow:hidden;
}

/* Soviet flag */
#flag{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40vw;
opacity:0.76;
color:red;
z-index:-2;
pointer-events:none;
}

/* Matrix */
#matrix{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* Tanks */
.tank{
position:fixed;
top:50%;
transform:translateY(-50%);
width:220px;
opacity:0.9;
z-index:1;
pointer-events:none;
}

#tankLeft{ left:20px; }
#tankRight{ right:20px; transform:translateY(-50%) scaleX(-1); }

/* Boot screen */

#boot{
position:absolute;
padding:20px;
white-space:pre-line;
}

/* Desktop */

#desktop{
display:none;
width:100%;
height:100%;
}

/* Frame window */

.window{
position:absolute;
top:5%;
left:12%;
width:76%;
height:90%;
background:#100000;
border:2px solid red;
box-shadow:0 0 25px red;
z-index:2;
}

.titlebar{
background:#300000;
padding:6px;
border-bottom:1px solid red;
}

iframe{
width:100%;
height:calc(100% - 32px);
border:none;
background:black;
}

/* Controls */

#controls{
position:fixed;
top:10px;
left:10px;
z-index:10;
}

button{
background:black;
color:yellow;
border:1px solid yellow;
font-family:inherit;
padding:4px 8px;
cursor:pointer;
}

/* FPS */

#fps{
position:fixed;
top:5px;
right:10px;
color:lime;
font-size:14px;
z-index:20;
}

</style>
</head>

<body>

<div id="flag">☭</div>

<img class="tank" id="tankLeft" src="https://pngimg.com/uploads/tank/tank_PNG132.png">
<img class="tank" id="tankRight" src="https://pngimg.com/uploads/tank/tank_PNG132.png">

<canvas id="matrix"></canvas>

<div id="controls">
<button onclick="toggleMatrix()">Matrix</button>
<button onclick="togglePerformance()">Performance</button>
</div>

<div id="boot"></div>

<div id="desktop">

<div class="window">

<div class="titlebar">
☭ SOVIET CLIENT TERMINAL ☭
</div>

<iframe id="clientFrame"></iframe>

</div>

</div>

<div id="fps"></div>

<script>

/* EDIT THIS */
const CLIENT_LINK="https://eaglercraft1-8.github.io/";

/* Boot screen */

const bootText=
`RED BUNKER OS
MILITARY NETWORK NODE
AUTHORIZATION: GRANTED
WELCOME COMRADE
LOADING CLIENT...`;

let i=0;
const bootDiv=document.getElementById("boot");

function boot(){

if(i<bootText.length){

bootDiv.innerHTML+=bootText[i++];
setTimeout(boot,20);

}else{

setTimeout(()=>{

bootDiv.style.display="none";
desktop.style.display="block";

document.getElementById("clientFrame").src=CLIENT_LINK;

},800);

}

}

boot();

/* MATRIX */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let fontSize=20;
let columns=canvas.width/fontSize;
let drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

let matrixOn=true;
let performanceMode=false;

function drawMatrix(){

if(!matrixOn) return;

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#FFD700";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

ctx.fillText("☭",i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(drawMatrix,performanceMode?120:50);

function toggleMatrix(){
matrixOn=!matrixOn;
}

function togglePerformance(){
performanceMode=!performanceMode;
}

/* FPS counter */

let last=performance.now();
let frames=0;

function fpsLoop(){

frames++;

let now=performance.now();

if(now-last>=1000){
fps.innerText="FPS: "+frames;
frames=0;
last=now;
}

requestAnimationFrame(fpsLoop);

}

fpsLoop();

/* Resize */

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>
</html>
