<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Soviet Terminal OS</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
--red:#b30000;
--yellow:#ffd700;
}

body{
margin:0;
background:black;
font-family:'Share Tech Mono',monospace;
color:var(--yellow);
overflow:hidden;
}

/* FLAG */

#flag{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:45vw;
opacity:0.3235732;
color:var(--red);
pointer-events:none;
z-index:-3;
}

/* MATRIX */

#matrix{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* RADAR */

#radar{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
background:
conic-gradient(rgba(255,0,0,.2),transparent 60%);
animation:spin 6s linear infinite;
z-index:-1;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* BOOT */

#boot{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
white-space:pre-line;
font-size:18px;
color:var(--yellow);
}

/* SETTINGS PANEL */

#settings{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#1a0000;
border-right:2px solid var(--yellow);
padding:10px;
display:none;
overflow:auto;
}

button{
width:100%;
margin:4px 0;
background:black;
border:1px solid var(--yellow);
color:var(--yellow);
font-family:inherit;
cursor:pointer;
}

/* TOPBAR */

#topbar{
position:fixed;
left:220px;
right:0;
top:0;
height:45px;
background:#300000;
border-bottom:2px solid var(--yellow);
display:flex;
align-items:center;
padding-left:10px;
}

#fps{
margin-left:auto;
margin-right:10px;
}

/* WINDOW */

#window{
position:absolute;
top:55px;
left:230px;
right:10px;
bottom:10px;
border:3px solid var(--yellow);
background:black;
resize:both;
overflow:hidden;
}

#titlebar{
background:#450000;
padding:6px;
cursor:move;
border-bottom:1px solid var(--yellow);
}

/* FRAME */

iframe{
width:100%;
height:calc(100% - 30px);
border:none;
}

/* TANKS */

.tank{
position:fixed;
top:50%;
transform:translateY(-50%);
width:180px;
opacity:.85;
pointer-events:none;
}

#tankLeft{left:0;}

#tankRight{
right:0;
transform:translateY(-50%) scaleX(-1);
}

</style>
</head>

<body>

<div id="flag">☭</div>
<div id="radar"></div>

<img id="tankLeft" class="tank" src="https://pngimg.com/uploads/tank/tank_PNG132.png">
<img id="tankRight" class="tank" src="https://pngimg.com/uploads/tank/tank_PNG132.png">

<canvas id="matrix"></canvas>

<div id="boot"></div>

<div id="settings">

<h3>SETTINGS</h3>

<button onclick="toggleMatrix()">Matrix</button>
<button onclick="toggleFlag()">Flag</button>
<button onclick="toggleRadar()">Radar</button>
<button onclick="toggleTanks()">Tanks</button>
<button onclick="toggleFPS()">FPS</button>
<button onclick="toggleCRT()">CRT Effect</button>
<button onclick="toggleIcons()">Desktop Icons</button>
<button onclick="performanceMode()">Performance Mode</button>
<button onclick="fullscreenApp()">Fullscreen</button>

</div>

<div id="topbar">
☭ SOVIET TERMINAL OS
<div id="fps">FPS:0</div>
</div>

<div id="window">

<div id="titlebar">APPLICATION TERMINAL</div>

<iframe id="app"></iframe>

</div>

<div id="icons" style="display:none;position:fixed;bottom:20px;left:240px;">
<div>🖥 APP</div>
<div>⚙ SETTINGS</div>
</div>

<script>

/* PUT YOUR APP HERE */

const APP_URL="YOURLINKHERE";

/* BOOT */

const bootText=`SOVIET TERMINAL OS
NODE CONNECTED
AUTHORIZATION: COMRADE
INITIALIZING SYSTEM
LOADING MODULES`;

let i=0;

function boot(){

if(i<bootText.length){
boot.innerHTML+=bootText[i++];
setTimeout(boot,20);
}else{

setTimeout(()=>{

boot.style.display="none";
settings.style.display="block";
document.getElementById("app").src=APP_URL;

},900);

}

}

boot();

/* MATRIX */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let fontSize=18;
let columns=canvas.width/fontSize;
let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

const words=["☭","SOVIET","UNION"];

let matrix=true;

function drawMatrix(){

if(!matrix)return;

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ffd700";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=words[Math.floor(Math.random()*words.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(drawMatrix,50);

/* FPS */

let frames=0;
let last=performance.now();

function fpsLoop(){

frames++;

let now=performance.now();

if(now-last>=1000){

fps.innerText="FPS:"+frames;
frames=0;
last=now;

}

requestAnimationFrame(fpsLoop);

}

fpsLoop();

/* SETTINGS */

function toggleMatrix(){matrix=!matrix;}

function toggleFlag(){
flag.style.display=
flag.style.display==="none"?"block":"none";
}

function toggleRadar(){
radar.style.display=
radar.style.display==="none"?"block":"none";
}

function toggleTanks(){

let state=tankLeft.style.display==="none";

tankLeft.style.display=state?"block":"none";
tankRight.style.display=state?"block":"none";

}

function toggleFPS(){
fps.style.display=
fps.style.display==="none"?"block":"none";
}

function toggleIcons(){
icons.style.display=
icons.style.display==="none"?"block":"block";
}

function performanceMode(){
fontSize=28;
}

function fullscreenApp(){
document.getElementById("app").requestFullscreen();
}

/* CRT EFFECT */

let crt=false;

function toggleCRT(){

crt=!crt;

if(crt){

document.body.style.filter="contrast(1.2) saturate(1.2)";

}else{

document.body.style.filter="none";

}

}

/* DRAG WINDOW */

let win=document.getElementById("window");
let bar=document.getElementById("titlebar");

bar.onmousedown=function(e){

let x=e.clientX-win.offsetLeft;
let y=e.clientY-win.offsetTop;

document.onmousemove=function(e){

win.style.left=e.clientX-x+"px";
win.style.top=e.clientY-y+"px";

};

document.onmouseup=function(){

document.onmousemove=null;

};

};

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>
</html>
