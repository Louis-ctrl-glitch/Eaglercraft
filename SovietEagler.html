<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Soviet Eaglercraft Loader</title>

<style>

body{
margin:0;
background:black;
font-family:monospace;
color:#00ff00;
overflow:hidden;
}

/* Soviet flag background */

#flag{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_the_Soviet_Union.svg/1920px-Flag_of_the_Soviet_Union.svg.png");
background-size:cover;
opacity:0.76;
z-index:-2;
}

/* Matrix canvas */

#matrix{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* Boot screen */

#boot{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:22px;
background:black;
z-index:5;
}

/* Main UI */

#ui{
display:none;
height:100vh;
width:100vw;
}

/* Game frame */

#gameFrame{
position:absolute;
top:60px;
left:220px;
right:220px;
bottom:20px;
border:3px solid #00ff00;
}

/* Tanks */

.tank{
position:absolute;
top:50%;
transform:translateY(-50%);
width:200px;
opacity:0.85;
}

#tankLeft{ left:5px; }
#tankRight{ right:5px; transform:translateY(-50%) scaleX(-1); }

/* Top bar */

#topbar{
height:50px;
background:black;
border-bottom:2px solid #00ff00;
display:flex;
align-items:center;
padding-left:10px;
}

/* FPS */

#fps{
margin-left:auto;
margin-right:20px;
}

/* Settings panel */

#settings{
position:absolute;
top:60px;
left:10px;
width:190px;
background:black;
border:2px solid #00ff00;
padding:10px;
font-size:13px;
}

input[type=range]{
width:100%;
}

</style>
</head>

<body>

<div id="flag"></div>
<canvas id="matrix"></canvas>

<!-- Boot Screen -->

<div id="boot">
<div>SOVIET SYSTEM BOOTING...</div>
<div id="bootText"></div>
</div>

<!-- Main UI -->

<div id="ui">

<div id="topbar">
SOVIET EAGLERCRAFT TERMINAL
<div id="fps">FPS: 0</div>
</div>

<div id="settings">

<b>Settings</b><br><br>

Matrix Speed
<input type="range" id="speed" min="2" max="20" value="10">

Matrix Density
<input type="range" id="density" min="5" max="40" value="20">

Matrix Color
<input type="color" id="color" value="#00ff00">

<br><br>

<label><input type="checkbox" id="toggleMatrix" checked> Matrix</label><br>
<label><input type="checkbox" id="toggleFlag" checked> Flag</label><br>
<label><input type="checkbox" id="toggleTanks" checked> Tanks</label><br>
<label><input type="checkbox" id="toggleFPS" checked> FPS</label>

</div>

<img id="tankLeft" class="tank"
src="https://upload.wikimedia.org/wikipedia/commons/5/5a/T-34-85_tank.jpg">

<img id="tankRight" class="tank"
src="https://upload.wikimedia.org/wikipedia/commons/5/5a/T-34-85_tank.jpg">

<iframe id="gameFrame"
src="https://eaglercraft1-8.github.io/"
allowfullscreen></iframe>

</div>

<script>

/* =========================
BOOT TEXT
========================= */

const bootLines=[
"INITIALIZING SOVIET NETWORK...",
"LOADING COMMUNIST PROTOCOLS...",
"AUTHORIZING COMRADE...",
"ACCESS GRANTED"
];

let bootIndex=0;

function bootNext(){
if(bootIndex<bootLines.length){
document.getElementById("bootText").innerHTML+=bootLines[bootIndex]+"<br>";
bootIndex++;
setTimeout(bootNext,900);
}else{

setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("ui").style.display="block";
},800);

}
}

bootNext();

/* =========================
MATRIX RAIN
========================= */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let letters="SOVIET UNION ☭ ☭ ☭ 010101";
letters=letters.split("");

let fontSize=16;
let columns;
let drops=[];

let matrixSpeed=10;
let matrixDensity=20;
let matrixColor="#00ff00";

function initMatrix(){

columns=canvas.width/fontSize;

drops=[];

for(let i=0;i<columns;i++){
drops[i]=Math.random()*canvas.height;
}

}

initMatrix();

function drawMatrix(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=matrixColor;
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]+=matrixSpeed/10;

}

}

setInterval(drawMatrix,50);

/* =========================
FPS COUNTER
========================= */

let fps=0;
let frames=0;
let last=performance.now();

function fpsLoop(){

frames++;

const now=performance.now();

if(now-last>=1000){
fps=frames;
frames=0;
last=now;
document.getElementById("fps").innerText="FPS: "+fps;
}

requestAnimationFrame(fpsLoop);

}

fpsLoop();

/* =========================
SETTINGS
========================= */

document.getElementById("speed").oninput=e=>{
matrixSpeed=e.target.value;
};

document.getElementById("density").oninput=e=>{
matrixDensity=e.target.value;
initMatrix();
};

document.getElementById("color").oninput=e=>{
matrixColor=e.target.value;
};

document.getElementById("toggleMatrix").onchange=e=>{
canvas.style.display=e.target.checked?"block":"none";
};

document.getElementById("toggleFlag").onchange=e=>{
document.getElementById("flag").style.display=e.target.checked?"block":"none";
};

document.getElementById("toggleTanks").onchange=e=>{
const v=e.target.checked?"block":"none";
document.getElementById("tankLeft").style.display=v;
document.getElementById("tankRight").style.display=v;
};

document.getElementById("toggleFPS").onchange=e=>{
document.getElementById("fps").style.display=e.target.checked?"block":"none";
};

/* =========================
RESIZE
========================= */

window.onresize=()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
initMatrix();
};

</script>

</body>
</html>
