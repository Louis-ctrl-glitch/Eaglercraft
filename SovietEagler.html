<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RED BUNKER OS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    background:#050000;
    color:#ff2a2a;
    font-family:'Share Tech Mono',monospace;
    overflow:hidden;
}

/* CRT Scanlines */
body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        0deg,
        rgba(255,0,0,0.08) 0px,
        rgba(255,0,0,0.08) 2px,
        transparent 2px,
        transparent 4px
    );
    pointer-events:none;
}

/* Flicker */
@keyframes flicker{
    0%{opacity:.95}
    50%{opacity:1}
    100%{opacity:.97}
}
body{animation:flicker .15s infinite}

/* Boot Screen */
#boot{
    position:absolute;
    width:100%;
    height:100%;
    padding:20px;
    white-space:pre-line;
}

/* Desktop */
#desktop{
    display:none;
    width:100%;
    height:100%;
    position:absolute;
}

/* Taskbar */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    background:#200000;
    border-top:1px solid red;
    padding:5px;
}

/* Window */
.window{
    position:absolute;
    width:700px;
    height:450px;
    background:#100000;
    border:2px solid red;
    box-shadow:0 0 15px red;
}

.titlebar{
    background:#300000;
    padding:5px;
    cursor:move;
    border-bottom:1px solid red;
}

.content{
    padding:5px;
    height:calc(100% - 30px);
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

/* Desktop icons */
.icon{
    cursor:pointer;
    margin:20px;
}

button{
    background:black;
    color:red;
    border:1px solid red;
    padding:5px 10px;
    cursor:pointer;
}

button:hover{
    background:red;
    color:black;
}

/* Animated flag */
#flag{
    position:absolute;
    top:20px;
    right:20px;
    width:120px;
}
</style>
</head>

<body>

<div id="boot"></div>

<div id="desktop">

<!-- Animated Flag -->
<svg id="flag" viewBox="0 0 200 120">
<path fill="red">
<animate attributeName="d"
dur="3s"
repeatCount="indefinite"
values="
M0,0 L200,10 L200,110 L0,100 Z;
M0,10 L200,0 L200,100 L0,110 Z;
M0,0 L200,10 L200,110 L0,100 Z"/>
</path>
</svg>

<div class="icon" onclick="openWindow()">☭ Launch Client</div>

<div id="taskbar">
RED BUNKER OS v7.0 |
<button onclick="playAnthem()">Play Anthem</button>
</div>

</div>

<audio id="anthem" src=""></audio>
<audio id="bootSound" src=""></audio>

<script>
/* Default Link */
let clientURL = "https://eaglercraft1-8.github.io/";

/* Boot Text */
const bootText = `
RED BUNKER OS v7.0
PROPERTY OF THE STATE
---------------------------
INITIALIZING GPU...
CHECKING SECURITY CLEARANCE...
CONNECTING TO CENTRAL NODE...
AUTHORIZATION GRANTED.
WELCOME, COMRADE.
`;

let i=0;
function typeBoot(){
    if(i<bootText.length){
        document.getElementById("boot").innerHTML+=bootText.charAt(i);
        i++;
        setTimeout(typeBoot,20);
    }else{
        setTimeout(()=>{
            document.getElementById("boot").style.display="none";
            document.getElementById("desktop").style.display="block";
        },1000);
    }
}
typeBoot();

/* Open Window */
function openWindow(){
    let win=document.createElement("div");
    win.className="window";
    win.style.top="100px";
    win.style.left="100px";

    win.innerHTML=`
        <div class="titlebar">MILITARY CLIENT NODE</div>
        <div class="content">
            <button onclick="this.parentElement.querySelector('iframe').requestFullscreen()">Fullscreen</button>
            <button onclick="this.closest('.window').remove()">Close</button>
            <br><br>
            <iframe src="${clientURL}"></iframe>
        </div>
    `;

    document.getElementById("desktop").appendChild(win);
    dragElement(win);
}

/* Dragging */
function dragElement(el){
    let pos1=0,pos2=0,pos3=0,pos4=0;
    el.querySelector(".titlebar").onmousedown=dragMouseDown;

    function dragMouseDown(e){
        e=e||window.event;
        e.preventDefault();
        pos3=e.clientX;
        pos4=e.clientY;
        document.onmouseup=closeDrag;
        document.onmousemove=elementDrag;
    }

    function elementDrag(e){
        e=e||window.event;
        e.preventDefault();
        pos1=pos3-e.clientX;
        pos2=pos4-e.clientY;
        pos3=e.clientX;
        pos4=e.clientY;
        el.style.top=(el.offsetTop-pos2)+"px";
        el.style.left=(el.offsetLeft-pos1)+"px";
    }

    function closeDrag(){
        document.onmouseup=null;
        document.onmousemove=null;
    }
}

/* Anthem */
function playAnthem(){
    document.getElementById("anthem").play().catch(()=>{});
}
</script>

</body>
</html>
