<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RedCraft Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    background: #050000;
    color: #ff1a1a;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
}

/* CRT Scanlines */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,0,0,0.08) 0px,
        rgba(255,0,0,0.08) 2px,
        transparent 2px,
        transparent 4px
    );
    pointer-events: none;
}

/* Flicker */
@keyframes flicker {
    0% {opacity: 0.95;}
    50% {opacity: 1;}
    100% {opacity: 0.97;}
}
body { animation: flicker 0.15s infinite; }

.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    padding: 20px;
}

.hidden { display: none; }

input, select {
    background: black;
    color: red;
    border: 1px solid red;
    padding: 5px;
    width: 300px;
    font-family: inherit;
}

button {
    background: black;
    color: red;
    border: 1px solid red;
    padding: 6px 12px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: red;
    color: black;
}

iframe {
    width: 100%;
    height: 75%;
    border: 1px solid red;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="boot" class="screen"></div>

<div id="login" class="screen hidden">
<h2>☭ REDCRAFT WORKERS TERMINAL ☭</h2>
Comrade Name:<br>
<input id="username" placeholder="Enter Name"><br>
<button onclick="goLauncher()">AUTHORIZE</button>
</div>

<div id="launcher" class="screen hidden">
<h2 id="welcome"></h2>

Eaglercraft Client URL:<br>
<input id="clientURL" placeholder="Paste your client link here"><br>
<button onclick="saveURL()">SAVE LINK</button>
<button onclick="launch()">LAUNCH</button>

<br><br>

Server Mode:<br>
<select>
<option>Singleplayer</option>
<option>Multiplayer</option>
</select>

<iframe id="gameFrame"></iframe>
</div>

<script>
/* Boot animation */
const bootText = `
REDCRAFT OS v5.0
PROPERTY OF THE UNION
-------------------------
INITIALIZING GPU...
CHECKING WORKER ID...
CONNECTING TO MOSCOW MAINFRAME...
ACCESS GRANTED.
`;

let i = 0;
function typeBoot() {
    if (i < bootText.length) {
        document.getElementById("boot").innerHTML += bootText.charAt(i);
        i++;
        setTimeout(typeBoot, 25);
    } else {
        setTimeout(() => {
            document.getElementById("boot").classList.add("hidden");
            document.getElementById("login").classList.remove("hidden");
        }, 1000);
    }
}
typeBoot();

/* Login */
function goLauncher() {
    const name = document.getElementById("username").value || "Comrade";
    document.getElementById("login").classList.add("hidden");
    document.getElementById("launcher").classList.remove("hidden");
    document.getElementById("welcome").innerText = 
        "MILITARY BLOCK NODE | AUTHORIZED: " + name;
}

/* Save link locally */
function saveURL() {
    const url = document.getElementById("clientURL").value;
    if(url){
        localStorage.setItem("eaglerLink", url);
        alert("Link saved, Comrade.");
    }
}

/* Auto-load saved link */
window.onload = function() {
    const saved = localStorage.getItem("eaglerLink");
    if(saved){
        document.getElementById("clientURL").value = saved;
    }
}

/* Launch game */
function launch() {
    const url = document.getElementById("clientURL").value;
    if(url){
        document.getElementById("gameFrame").src = url;
    } else {
        alert("No client link entered.");
    }
}
</script>

</body>
</html>
