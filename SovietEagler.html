<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RED BUNKER CLIENT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#ff2a2a;
font-family:'Share Tech Mono',monospace;
overflow:hidden;
}

/* Soviet flag background */
#flag{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40vw;
opacity:0.76;
color:red;
z-index:-2;
pointer-events:none;
}

/* Matrix canvas */
#matrix{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* Boot screen */
#boot{
position:absolute;
padding:20px;
white-space:pre-line;
}

/* Desktop */
#desktop{
display:none;
width:100%;
height:100%;
}

/* Window */
.window{
position:absolute;
top:10%;
left:10%;
width:80%;
height:80%;
background:#100000;
border:2px solid red;
box-shadow:0 0 20px red;
}

.titlebar{
background:#300000;
padding:6px;
cursor:move;
border-bottom:1px solid red;
}

iframe{
width:100%;
height:calc(100% - 35px);
border:none;
}

/* Control panel */
#controls{
position:absolute;
top:10px;
left:10px;
z-index:5;
}

button{
background:black;
color:yellow;
border:1px solid yellow;
font-family:inherit;
margin:2px;
}

/* FPS counter */
#fps{
position:fixed;
top:5px;
right:10px;
color:lime;
font-size:14px;
z-index:10;
}

</style>
</head>

<body>

<div id="flag">☭</div>
<canvas id="matrix"></canvas>

<div id="controls">
<button onclick="toggleMatrix()">Matrix</button>
<button onclick="toggleFlash()">Flash</button>
<button onclick="togglePerformance()">Performance</button>
</div>

<div id="boot"></div>

<div id="desktop">
<div class="window" id="mainWindow">
<div class="titlebar">☭ SOVIET CLIENT TERMINAL ☭</div>
<iframe id="clientFrame"></iframe>
</div>
</div>

<div id="fps"></div>

<script>

/* EDIT THIS */
const CLIENT_LINK="lercraft1-8.github.io";

/* Settings */
let matrixOn=true;
let flashOn=true;
let performance=false;

/* Boot screen */
const bootText=
`RED BUNKER OS
STATE NETWORK NODE
AUTHORIZATION: GRANTED
WELCOME COMRADE
LOADING CLIENT...`;

let i=0;
function boot(){
if(i<bootText.length){
bootDiv.innerHTML+=bootText[i++];
setTimeout(boot,20);
}else{
setTimeout(()=>{
bootDiv.style.display="none";
desktop.style.display="block";
clientFrame.src=CLIENT_LINK;
},700);
}
}
const bootDiv=document.getElementById("boot");
boot();

/* MATRIX EFFECT */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let fontSize=20;
let columns=canvas.width/fontSize;
let drops=[];

for(let i=0;i<columns;i++)drops[i]=1;

function drawMatrix(){

if(!matrixOn) return;

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#FFD700";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

ctx.fillText("☭",i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(drawMatrix,performance?120:50);

/* Controls */

function toggleMatrix(){
matrixOn=!matrixOn;
}

function toggleFlash(){
flashOn=!flashOn;
document.body.style.animation=flashOn?"flicker .15s infinite":"none";
}

function togglePerformance(){
performance=!performance;
}

/* FPS Counter */

let last=performance.now();
let frames=0;

function fpsCounter(){
frames++;
let now=performance.now();

if(now-last>=1000){
fps.innerText="FPS: "+frames;
frames=0;
last=now;
}

requestAnimationFrame(fpsCounter);
}

fpsCounter();

/* Drag window */

dragElement(document.getElementById("mainWindow"));

function dragElement(el){
let pos1=0,pos2=0,pos3=0,pos4=0;

el.querySelector(".titlebar").onmousedown=e=>{
pos3=e.clientX;
pos4=e.clientY;

document.onmousemove=e=>{
pos1=pos3-e.clientX;
pos2=pos4-e.clientY;
pos3=e.clientX;
pos4=e.clientY;

el.style.top=(el.offsetTop-pos2)+"px";
el.style.left=(el.offsetLeft-pos1)+"px";
};

document.onmouseup=()=>document.onmousemove=null;
};

}

/* Resize matrix */

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>

</body>
</html>
